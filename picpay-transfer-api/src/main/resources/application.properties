spring.application.name=picpay-transfer-api

spring.datasource.url=jdbc:h2:mem:picpaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

picpay.authorizer.url=https://util.devi.tools/api/v2/authorize
picpay.notification.url=https://util.devi.tools/api/v1/notify